<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡銘傑 | 數位名片</title>
    <style>
        /* === 全局與 Notion 風格變數 === */
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-gray: #787774;
            --notion-border: rgba(55, 53, 47, 0.16);
            --notion-hover: rgba(55, 53, 47, 0.08);
            --font-stack: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: var(--font-stack);
            color: var(--notion-text);
            -webkit-font-smoothing: antialiased;
        }

        /* === 背景區塊 (包含點擊變色互動) === */
        #bg-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fafafa; /* 預設極簡灰白 */
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px;
            box-sizing: border-box;
            cursor: pointer; /* 提示背景可點擊 */
            position: relative;
        }

        /* === 主卡片設計 === */
        .card {
            background: var(--notion-bg);
            max-width: 480px;
            width: 100%;
            padding: 48px 36px;
            border-radius: 20px;
            border: 1px solid var(--notion-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            text-align: center;
            cursor: default; /* 卡片內部恢復預設游標 */
            z-index: 10;
            box-sizing: border-box;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === 大頭照與動畫 === */
        .avatar-container {
            width: 104px;
            height: 104px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background-color: #f3f3f3;
            border: 1px solid var(--notion-border);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-container:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* === 文字排版 === */
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 10px;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 15px;
            color: var(--notion-gray);
            margin: 0 0 36px;
            line-height: 1.6;
        }

        /* === 社群按鈕區 === */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 999px; /* 圓角按鈕 */
            border: 1px solid var(--notion-border);
            color: var(--notion-text);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            background-color: transparent;
        }

        .link-btn:hover {
            background-color: var(--notion-hover);
            transform: translateY(-2px);
        }

        .link-btn span.icon {
            font-size: 18px;
        }

        /* === 小提示文字 === */
        .hint-text {
            margin-top: 32px;
            font-size: 13px;
            color: #b0b0b0;
            letter-spacing: 0.05em;
            pointer-events: none;
            animation: fadeIn 2s ease forwards 1s;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* === 響應式調整 === */
        @media (max-width: 480px) {
            .card {
                padding: 40px 24px;
                border-radius: 16px;
                border: none;
                box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            }
            h1 { font-size: 24px; }
            p.subtitle { font-size: 14px; }
            .link-btn { padding: 12px 20px; }
        }
    </style>
</head>
<body>

    <!-- 背景區塊 -->
    <div id="bg-wrapper">
        
        <!-- 卡片區塊 -->
        <div class="card" id="main-card">
            
            <!-- 大頭照 (使用上傳的圖片) -->
            <div class="avatar-container">
                <img src="image_3f21c1.jpg" alt="簡銘傑的大頭貼">
            </div>

            <!-- 個人資訊 -->
            <h1>簡銘傑</h1>
            <p class="subtitle">熱愛運動的北醫兒童癌症研究學生</p>

            <!-- 社群連結 -->
            <div class="links">
                <a href="https://www.instagram.com/grandmamateddy?igsh=MWV6ejZuNG94cXZ1Mw%3D%3D&utm_source=qr" target="_blank" class="link-btn">
                    <span class="icon">📷</span> Instagram
                </a>
                <a href="https://github.com/otonifrio2812" target="_blank" class="link-btn">
                    <span class="icon">🐙</span> GitHub
                </a>
                <a href="mailto:wind2812@gmail.com" class="link-btn">
                    <span class="icon">✉️</span> wind2812@gmail.com
                </a>
            </div>

        </div>

        <div class="hint-text">✨ 點擊空白處隨機切換背景色</div>

    </div>

    <script>
        // 定義粉嫩色系 (Pastel Colors) 的陣列
        const pastelColors = [
            '#fafafa', // 預設白灰
            '#F3E8FF', // 薰衣草紫
            '#E8F8F5', // 嫩綠色
            '#FFE5B4', // 蜜桃橘
            '#EBF5FB', // 天空藍
            '#FEF9E7', // 奶油黃
            '#FCE4EC'  // 櫻花粉
        ];

        let currentColorIndex = 0;
        const bgWrapper = document.getElementById('bg-wrapper');

        // 點擊背景切換顏色事件
        bgWrapper.addEventListener('click', function(e) {
            // 確保只有點擊到「背景本身」才會觸發，點擊到卡片或按鈕不會觸發
            if (e.target === this) {
                let newIndex = currentColorIndex;
                
                // 確保隨機抽出的顏色與目前不同
                while (newIndex === currentColorIndex) {
                    newIndex = Math.floor(Math.random() * pastelColors.length);
                }
                
                currentColorIndex = newIndex;
                this.style.backgroundColor = pastelColors[currentColorIndex];
            }
        });
    </script>
</body>
</html>
